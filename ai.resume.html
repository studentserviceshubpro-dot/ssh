<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micron AI Resume</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --micron-blue: #59b2e9;
            --micron-purple: #a855f7;
            --bg-light: #f8fbff;
            --card-white: #ffffff;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            background: var(--card-white);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .logo {
            font-weight: 900;
            font-size: 22px;
            color: var(--micron-blue);
            letter-spacing: 1px;
            font-style: italic;
        }

        .user-icon {
            background: var(--micron-blue);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* --- Main Content Area --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 80px;
        }

        /* --- Landing Page State --- */
        .resume-landing {
            text-align: center;
        }

        .hero-icon {
            font-size: 60px;
            color: var(--micron-purple);
            margin: 40px 0 20px;
        }

        .landing-card {
            background: var(--card-white);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 20px;
        }

        .btn-primary {
            background-color: var(--micron-purple);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-primary:active { transform: scale(0.98); }

        /* --- Form Page State (Hidden by default) --- */
        #resume-form-container { display: none; }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #666;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus {
            border-color: var(--micron-blue);
            outline: none;
        }

        /* --- Footer --- */
        footer {
            background: var(--card-white);
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #eee;
        }

        .nav-item { color: var(--micron-blue); font-size: 20px; cursor: pointer; }
        .plus-btn {
            background: var(--micron-blue);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -35px;
            box-shadow: 0 4px 10px rgba(89, 178, 233, 0.4);
        }
    </style>
</head>
<body>

    <header>
        <i class="fa-solid fa-bars" style="color: #666;"></i>
        <div class="logo">MICRON</div>
        <div class="user-icon">US</div>
    </header>

    <main id="main-content">
        <div id="landing-page" class="resume-landing">
            <div class="hero-icon">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
            </div>
            <h2>AI Resume Builder</h2>
            <p style="color: #777;">Create a professional resume in seconds using our advanced AI.</p>
            
            <div class="landing-card">
                <button class="btn-primary" onclick="showForm()">
                    <i class="fa-solid fa-plus"></i> &nbsp; Create a Resume
                </button>
            </div>
        </div>

        <div id="resume-form-container">
            <h3 style="margin-top: 0;">Enter Details</h3>
            <div class="landing-card">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Professional Title</label>
                    <input type="text" placeholder="Project Manager">
                </div>
                <div class="form-group">
                    <label>Experience Summary</label>
                    <textarea rows="4" placeholder="Briefly describe your work history..."></textarea>
                </div>
                <div class="form-group">
                    <label>Key Skills</label>
                    <input type="text" placeholder="Management, AI, Engineering">
                </div>
                <button class="btn-primary" onclick="generateAI()" id="generate-btn">
                    Generate AI Resume
                </button>
            </div>
        </div>
    </main>

    <footer>
        <div class="nav-item"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item"><i class="fa-solid fa-magnifying-glass"></i></div>
        <div class="plus-btn"><i class="fa-solid fa-plus"></i></div>
        <div class="nav-item"><i class="fa-solid fa-bell"></i></div>
        <div class="nav-item"><i class="fa-solid fa-user"></i></div>
    </footer>

    <script>
        function showForm() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('resume-form-container').style.display = 'block';
        }

        function generateAI() {
            const btn = document.getElementById('generate-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Analyzing...';
            btn.style.opacity = '0.7';
            
            // Simulate AI Processing
            setTimeout(() => {
                alert("AI has generated your professional resume! (Check your downloads/preview)");
                btn.innerHTML = 'Generate AI Resume';
                btn.style.opacity = '1';
            }, 2500);
        }
    </script>
</body>
</html>
