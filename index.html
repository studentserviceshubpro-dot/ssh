<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Micron</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #EBF4FF; }
        .form-card { 
            border-radius: 40px 40px 0 0; 
            box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .input-field {
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .input-field:focus-within {
            border-color: #2563EB;
            box-shadow: 0 0 0 1px #2563EB;
        }
        .btn-primary {
            background-color: #2563EB;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="flex justify-between items-center px-6 py-4 bg-transparent w-full max-w-md mx-auto">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 flex items-center justify-center">
                <img src="https://img.icons8.com/color/96/m-key.png" alt="Micron Logo" class="w-full">
            </div>
            <span class="font-bold text-[#1E3A8A] text-xl tracking-tight">LOGO</span>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="switchForm('signup')" class="border-2 border-[#2563EB] text-[#2563EB] px-5 py-1.5 rounded-xl text-sm font-bold bg-[#EBF4FF] hover:bg-blue-100 transition">Sign Up</button>
            <div class="flex flex-col gap-1 cursor-pointer">
                <div class="w-7 h-1 bg-[#4B5563] rounded-full"></div>
                <div class="w-7 h-1 bg-[#4B5563] rounded-full"></div>
                <div class="w-7 h-1 bg-[#4B5563] rounded-full"></div>
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col max-w-md mx-auto w-full">
        
        <div class="px-8 py-6 flex justify-center">
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/otp-verification-illustration-download-in-svg-png-gif-file-formats--one-time-password-security-account-pack-safety-illustrations-5309322.png" 
                 alt="Illustration" class="w-full max-w-[280px] drop-shadow-xl">
        </div>

        <div class="form-card bg-white flex-grow p-8 flex flex-col">
            
            <div id="login-section">
                <div class="text-center mb-8">
                    <div class="inline-block p-3 rounded-full bg-[#EBF4FF] mb-2">
                        <img src="https://img.icons8.com/fluency/48/globe.png" class="w-10 h-10">
                    </div>
                    <p class="text-[#1E3A8A] font-bold uppercase tracking-wider mb-4">Logo</p>
                    <h1 class="text-3xl font-bold text-[#1F2937] mb-1">Welcome Back!</h1>
                    <p class="text-gray-400 font-medium">Login to your account</p>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-[#4B5563] mb-2 ml-1">Email</label>
                        <div class="input-field flex items-center px-4 py-3.5 bg-white">
                            <span class="mr-3">📧</span>
                            <input type="email" placeholder="Enter your email" class="w-full outline-none text-gray-600 placeholder-gray-300">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-[#4B5563] mb-2 ml-1">Password</label>
                        <div class="input-field flex items-center px-4 py-3.5 bg-white">
                            <span class="mr-3">🔒</span>
                            <input type="password" placeholder="Enter your password" class="w-full outline-none text-gray-600 placeholder-gray-300">
                            <span class="ml-2 cursor-pointer">👁️</span>
                        </div>
                    </div>
                    
                    <button class="w-full btn-primary text-white font-bold py-4 text-lg hover:bg-blue-700 transition-all mt-4">Login</button>
                    
                    <div class="text-center mt-6">
                        <button onclick="switchForm('forgot')" class="text-[#4B5563] font-semibold hover:text-blue-600">Forgot your password? <span class="text-blue-500">→</span></button>
                    </div>
                </div>
            </div>

            <div id="signup-section" class="hidden">
                <h2 class="text-2xl font-bold text-[#1E3A8A] mb-6">Sign Up to Get Started</h2>
                <div class="space-y-3 overflow-y-auto max-h-[400px] pr-2">
                    <input type="text" placeholder="Full Name" class="w-full input-field px-4 py-3 outline-none">
                    <input type="text" placeholder="DD/MM/YYYY" class="w-full input-field px-4 py-3 outline-none">
                    <input type="tel" placeholder="Phone Number" class="w-full input-field px-4 py-3 outline-none">
                    <input type="email" placeholder="Email Address" class="w-full input-field px-4 py-3 outline-none">
                    <input type="text" placeholder="Referral Code (Optional)" class="w-full input-field px-4 py-3 outline-none">
                    <input type="password" placeholder="Create Password" class="w-full input-field px-4 py-3 outline-none">
                    <button class="w-full btn-primary text-white font-bold py-4 mt-2">Create Account</button>
                    <button onclick="switchForm('login')" class="w-full text-sm text-gray-500 py-2">Back to Login</button>
                </div>
            </div>

            <div id="forgot-section" class="hidden text-center">
                <h2 class="text-2xl font-bold text-[#1E3A8A] mb-2">Reset Your Password</h2>
                <p class="text-sm text-gray-400 mb-6">Enter your details to receive an OTP</p>
                <div class="space-y-4">
                    <input type="email" placeholder="Registered Email" class="w-full input-field px-4 py-3 outline-none">
                    <input type="text" placeholder="User ID" class="w-full input-field px-4 py-3 outline-none">
                    <div class="flex justify-between text-xs font-bold text-gray-500 px-1">
                        <span>OTP</span>
                        <span class="text-blue-400">Resend OTP (59s)</span>
                    </div>
                    <div class="flex justify-between gap-2">
                        <input type="text" maxlength="1" class="w-12 h-12 border rounded-lg text-center font-bold text-xl outline-none border-blue-200">
                        <input type="text" maxlength="1" class="w-12 h-12 border rounded-lg text-center font-bold text-xl outline-none border-blue-200">
                        <input type="text" maxlength="1" class="w-12 h-12 border rounded-lg text-center font-bold text-xl outline-none border-blue-200">
                        <input type="text" maxlength="1" class="w-12 h-12 border rounded-lg text-center font-bold text-xl outline-none border-blue-200">
                    </div>
                    <button class="w-full btn-primary text-white font-bold py-4">Request OTP</button>
                    <button onclick="switchForm('login')" class="w-full text-sm text-gray-500">Cancel</button>
                </div>
            </div>

            <div class="mt-auto pt-8 border-t border-gray-100 text-center">
                <div class="flex justify-center gap-4 text-xs font-bold text-[#1E3A8A] mb-2">
                    <a href="#">Privacy Policy</a>
                    <span class="text-gray-300">|</span>
                    <a href="#">Terms & Conditions</a>
                </div>
                <p class="text-[10px] text-gray-400 font-medium">© 2024 YourWebsite. All rights reserved.</p>
            </div>
        </div>
    </main>

    <script>
        function switchForm(view) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('signup-section').classList.add('hidden');
            document.getElementById('forgot-section').classList.add('hidden');
            document.getElementById(view + '-section').classList.remove('hidden');
        }
    </script>
</body>
</html>
