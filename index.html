<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Services Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #3b82f6;
            --light-blue: #e0ebff;
            --text-dark: #1e293b;
            --bg-gradient: linear-gradient(135deg, #dcfce7 0%, #dbeafe 50%, #eff6ff 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Container & Card */
        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .logo-section img {
            width: 120px;
            margin-bottom: 10px;
        }

        h2 { color: var(--text-dark); margin-bottom: 8px; }
        p.subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 25px; }

        /* Form Styling */
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-dark);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary-blue); }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-primary:hover { background: #2563eb; }

        /* Links & Toggles */
        .links-group {
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .links-group a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 500;
        }

        .hidden { display: none; }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .auth-container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo-section">
        <img src="IMG_20260414_113028.jpg" alt="Logo">
    </div>

    <div id="login-form">
        <h2>Welcome Back!</h2>
        <p class="subtitle">Login to your account</p>
        
        <div class="form-group">
            <label>Email</label>
            <div class="input-wrapper">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" placeholder="Enter your email">
            </div>
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Enter your password">
            </div>
        </div>

        <button class="btn-primary">Login</button>
        
        <div class="links-group">
            <a href="#" onclick="toggleForm('reset')">Forgot your password? →</a><br><br>
            Don't have an account? <a href="#" onclick="toggleForm('signup')">Sign up</a>
        </div>
    </div>

    <div id="signup-form" class="hidden">
        <h2>Sign Up</h2>
        <p class="subtitle">Create your new account</p>
        
        <div class="form-group">
            <label>Full Name</label>
            <div class="input-wrapper">
                <i class="fa-regular fa-user"></i>
                <input type="text" placeholder="Enter full name">
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <div class="input-wrapper">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" placeholder="Enter email">
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Create a password">
            </div>
        </div>

        <button class="btn-primary">Create Account</button>
        
        <div class="links-group">
            Already have an account? <a href="#" onclick="toggleForm('login')">Login</a>
        </div>
    </div>

    <div id="reset-form" class="hidden">
        <h2>Reset Password</h2>
        <p class="subtitle">Enter your details to receive an OTP</p>
        
        <div class="form-group">
            <label>Registered Email</label>
            <div class="input-wrapper">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" placeholder="Enter registered email">
            </div>
        </div>

        <button class="btn-primary">Request OTP</button>
        
        <div class="links-group">
            <a href="#" onclick="toggleForm('login')">Back to Login</a>
        </div>
    </div>
</div>

<script>
    function toggleForm(formType) {
        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('signup-form').classList.add('hidden');
        document.getElementById('reset-form').classList.add('hidden');

        if(formType === 'login') {
            document.getElementById('login-form').classList.remove('hidden');
        } else if(formType === 'signup') {
            document.getElementById('signup-form').classList.remove('hidden');
        } else if(formType === 'reset') {
            document.getElementById('reset-form').classList.remove('hidden');
        }
    }
</script>

</body>
</html>
