<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micron - Auth Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f3f9ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Inter', sans-serif;
            color: #334155;
        }
        .header-white {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
        }
        .illustration-container {
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem 0; /* Reduced padding to make room for larger image */
            animation: float 6s ease-in-out infinite;
            width: 100%;
       }

       /* Updated image class to be significantly larger */
       .illustration-container img {
           width: 85%; /* Uses more horizontal space */
           max-width: 450px; /* Increased from 240px to 450px */
           height: auto;
           max-height: 35vh; /* Prevents it from getting too tall on short screens */
           object-fit: contain;
      }

        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .glass-card {
            background: #ffffff;
            box-shadow: 0 15px 50px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid #f1f5f9;
            z-index: 10;
        }
        /* Hide scrollbar for clean UI */
        body::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="header-white w-full p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <img src="IMG_20260414_113028.jpg" alt="Micron Logo" class="h-6">
            <div class="flex items-center gap-4">
                <button onclick="showForm('signup')" class="border border-gray-300 px-4 py-1 rounded-md text-sm font-medium hover:bg-gray-50 transition">Sign Up</button>
                <i class="fa-solid fa-bars text-xl text-gray-500 cursor-pointer"></i>
            </div>
        </div>
    </header>

  <main class="flex-grow flex flex-col items-center">
        
        <div class="illustration-container">
            <img src="Picsart_26-04-14_14-33-25-649.jpg" 
                 class="w-48 md:w-60 h-auto object-contain" alt="Background Illustration">
        </div>

        <div id="auth-card" class="glass-card w-[92%] max-w-[420px] rounded-[2.5rem] p-8 mb-12">
            
            <div id="login-form">
                <div class="text-center mb-8">
                    <img src="IMG_20260414_113028.jpg" alt="Logo" class="h-5 mx-auto mb-2 opacity-80">
                    <h1 class="text-2xl font-bold text-slate-800">Welcome Back!</h1>
                    <p class="text-slate-400 text-sm">Login to your account</p>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wide ml-1">Email</label>
                        <div class="relative mt-1">
                            <span class="absolute inset-y-0 left-4 flex items-center text-slate-400"><i class="fa-regular fa-envelope"></i></span>
                            <input type="email" placeholder="Enter your email" class="w-full pl-11 pr-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-100 outline-none focus:border-blue-400 focus:bg-white transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wide ml-1">Password</label>
                        <div class="relative mt-1">
                            <span class="absolute inset-y-0 left-4 flex items-center text-slate-400"><i class="fa-solid fa-lock"></i></span>
                            <input id="login-pass" type="password" placeholder="Enter your password" class="w-full pl-11 pr-12 py-3.5 rounded-2xl bg-slate-50 border border-slate-100 outline-none focus:border-blue-400 focus:bg-white transition-all">
                            <span onclick="togglePassword('login-pass', this)" class="absolute inset-y-0 right-4 flex items-center text-slate-400 cursor-pointer">
                                <i class="fa-regular fa-eye"></i>
                            </span>
                        </div>
                    </div>
                    <button onclick="handleLogin()" class="w-full bg-[#3b82f6] text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100">Login</button>
                </div>

                <div class="mt-8 text-center space-y-4">
                    <button onclick="showForm('reset')" class="text-sm font-medium text-slate-600 hover:text-blue-600 flex items-center justify-center gap-1 mx-auto transition">
                        Forgot your password? <i class="fa-solid fa-arrow-right text-[10px]"></i>
                    </button>
                    <p class="text-sm text-slate-400">Don't have an account? <span onclick="showForm('signup')" class="text-blue-600 font-bold cursor-pointer hover:underline">Sign up</span></p>
                </div>
            </div>

            <div id="signup-form" class="hidden">
                <h1 class="text-xl font-bold text-slate-800 mb-6 flex justify-between items-center">
                    Sign Up <i class="fa-solid fa-xmark text-slate-300 cursor-pointer text-sm" onclick="showForm('login')"></i>
                </h1>
                <div class="space-y-3">
                    <input type="text" placeholder="Full Name" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 outline-none">
                    <input type="text" placeholder="DD/MM/YYYY" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 outline-none">
                    <input type="tel" placeholder="Phone number" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 outline-none">
                    <input type="email" placeholder="Enter your email" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 outline-none">
                    <input type="password" placeholder="Create a password" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 outline-none">
                    <button onclick="handleSignup()" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold mt-4">Create Account</button>
                </div>
            </div>

            <div id="success-view" class="hidden text-center py-10">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800 mb-2">Success!</h1>
                <p class="text-slate-500 text-sm">Successfully Registered</p>
                <p class="text-slate-400 text-xs mt-4">Redirecting to login...</p>
            </div>

            <div id="reset-form" class="hidden">
                <h1 class="text-xl font-bold text-slate-800 text-center mb-1">Reset Your Password</h1>
                <p class="text-center text-xs text-slate-400 mb-8">Enter details to receive an OTP.</p>
                <div class="space-y-5">
                    <input type="email" placeholder="Enter registered email" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 outline-none">
                    <input type="text" placeholder="Enter your User ID" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 outline-none">
                    
                    <div class="flex justify-between items-center px-1">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1">OTP <i class="fa-solid fa-circle-check text-green-400"></i></span>
                        <span id="timer" onclick="handleOTPRequest()" class="text-xs text-slate-400 font-semibold">Resend OTP (59s)</span>
                    </div>

                    <div class="flex justify-between gap-2">
                        <input type="text" maxlength="1" class="w-12 h-12 border border-slate-200 rounded-xl text-center text-lg font-bold outline-none focus:border-blue-500 focus:bg-blue-50 transition-all">
                        <input type="text" maxlength="1" class="w-12 h-12 border border-slate-200 rounded-xl text-center text-lg font-bold outline-none focus:border-blue-500 focus:bg-blue-50 transition-all">
                        <input type="text" maxlength="1" class="w-12 h-12 border border-slate-200 rounded-xl text-center text-lg font-bold outline-none focus:border-blue-500 focus:bg-blue-50 transition-all">
                        <span class="flex items-center text-slate-300">-</span>
                        <input type="text" maxlength="1" class="w-12 h-12 border border-slate-200 rounded-xl text-center text-lg font-bold outline-none focus:border-blue-500 focus:bg-blue-50 transition-all">
                        <input type="text" maxlength="1" class="w-12 h-12 border border-slate-200 rounded-xl text-center text-lg font-bold outline-none focus:border-blue-500 focus:bg-blue-50 transition-all">
                        <input type="text" maxlength="1" class="w-12 h-12 border border-slate-200 rounded-xl text-center text-lg font-bold outline-none focus:border-blue-500 focus:bg-blue-50 transition-all">
                    </div>

                    <button id="otp-btn" onclick="handleOTPRequest()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold transition shadow-lg shadow-blue-50">Request OTP</button>
                    <p onclick="showForm('login')" class="text-center text-sm text-blue-600 font-semibold cursor-pointer">Back to Login</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let countdown;
        let isTimerRunning = false;
        
        function showForm(type) {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.add('hidden');
            document.getElementById('reset-form').classList.add('hidden');
            document.getElementById('success-view').classList.add('hidden');
            document.getElementById(type + '-form').classList.remove('hidden');
        }

        function togglePassword(inputId, iconEl) {
            const input = document.getElementById(inputId);
            const icon = iconEl.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function handleSignup() {
            // In a real app, you'd send data to your backend here
            showForm('success'); // 'success' isn't a form, so we use logic below
            document.getElementById('success-view').classList.remove('hidden');
            
            // Redirect back to login after 3 seconds
            setTimeout(() => {
                showForm('login');
            }, 3000);
        }

        function handleLogin() {
            // Logic to open user dashboard or external window
            alert("Login Successful! Redirecting to window...");
            window.location.href = "https://your-dashboard-link.vercel.app"; 
        }

        function startTimer(seconds) {
            clearInterval(countdown);
            isTimerRunning = true;
            const timerDisplay = document.getElementById('timer');
            timerDisplay.classList.remove('cursor-pointer', 'text-blue-600', 'underline');
            timerDisplay.classList.add('text-slate-400');
            
            let timeLeft = seconds;
            timerDisplay.innerText = `Resend OTP (${timeLeft}s)`;

            countdown = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = `Resend OTP (${timeLeft}s)`;
                
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    isTimerRunning = false;
                    timerDisplay.innerText = "Resend OTP Now";
                    timerDisplay.classList.replace('text-slate-400', 'text-blue-600');
                    timerDisplay.classList.add('cursor-pointer', 'underline');
                }
            }, 1000);
        }

        function handleOTPRequest() {
            if (isTimerRunning && event.target.id !== 'otp-btn') return;

            const btn = document.getElementById('otp-btn');
            const originalText = btn.innerText;
            btn.innerText = "Sending OTP...";
            btn.disabled = true;
            btn.style.opacity = "0.7";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.disabled = false;
                btn.style.opacity = "1";
                startTimer(59); 
            }, 1200);
        }
    </script>
