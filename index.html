<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micron - Welcome Back</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="flex flex-col">

    <header class="w-full p-4 flex justify-between items-center bg-transparent max-w-7xl mx-auto">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Micron_Technology_logo.svg/1200px-Micron_Technology_logo.svg.png" alt="Micron Logo" class="h-8">
        <div class="flex items-center gap-4">
            <button onclick="showForm('signup')" class="border border-gray-300 px-4 py-1 rounded text-sm font-medium hover:bg-gray-50">Sign Up</button>
            <i class="fa-solid fa-bars text-xl text-gray-600 cursor-pointer"></i>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center px-4 py-10 relative">
        
        <div class="mb-6 relative">
            <div class="w-48 h-48 bg-blue-100 rounded-full absolute top-0 left-1/2 -translate-x-1/2 blur-3xl opacity-50 -z-10"></div>
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/online-registration-8631168-6878696.png" alt="Illustration" class="w-64">
        </div>

        <div id="auth-card" class="glass-card w-full max-w-md rounded-3xl p-8 transition-all duration-300">
            
            <div id="login-form">
                <div class="text-center mb-8">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Micron_Technology_logo.svg/1200px-Micron_Technology_logo.svg.png" alt="Logo" class="h-6 mx-auto mb-2">
                    <h1 class="text-2xl font-bold text-gray-800">Welcome Back!</h1>
                    <p class="text-gray-500 text-sm">Login to your account</p>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="text-sm font-semibold text-gray-700">Email</label>
                        <div class="relative mt-1">
                            <span class="absolute inset-y-0 left-3 flex items-center text-gray-400"><i class="fa-regular fa-envelope"></i></span>
                            <input type="email" placeholder="Enter your email" class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-400 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-gray-700">Password</label>
                        <div class="relative mt-1">
                            <span class="absolute inset-y-0 left-3 flex items-center text-gray-400"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" placeholder="Enter your password" class="w-full pl-10 pr-10 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-400 outline-none">
                            <span class="absolute inset-y-0 right-3 flex items-center text-gray-400 cursor-pointer"><i class="fa-regular fa-eye"></i></span>
                        </div>
                    </div>
                    <button class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">Login</button>
                </div>

                <div class="mt-6 text-center space-y-4">
                    <button onclick="showForm('reset')" class="text-sm text-gray-600 hover:text-blue-600 flex items-center justify-center gap-1 mx-auto">
                        Forgot your password? <i class="fa-solid fa-arrow-right text-xs"></i>
                    </button>
                    <p class="text-sm text-gray-500">Don't have an account? <span onclick="showForm('signup')" class="text-blue-600 font-bold cursor-pointer">Sign up</span></p>
                </div>
            </div>

            <div id="signup-form" class="hidden">
                <h1 class="text-2xl font-bold text-gray-800 text-center mb-6 border-b pb-4">Sign Up to Get Started</h1>
                <div class="space-y-4">
                    <input type="text" placeholder="Full Name" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-400 outline-none">
                    <input type="text" placeholder="DD/MM/YYYY" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-400 outline-none">
                    <input type="tel" placeholder="Phone number" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-400 outline-none">
                    <input type="email" placeholder="Enter your email" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-400 outline-none">
                    <input type="text" placeholder="Referral Code (Optional)" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-400 outline-none">
                    <input type="password" placeholder="Create a password" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-400 outline-none">
                    <button class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Create Account</button>
                    <p onclick="showForm('login')" class="text-center text-sm text-blue-600 cursor-pointer font-medium mt-2">Back to Login</p>
                </div>
            </div>

            <div id="reset-form" class="hidden">
                <h1 class="text-2xl font-bold text-gray-800 text-center">Reset Your Password</h1>
                <p class="text-center text-sm text-gray-500 mb-6">Enter your details to receive an OTP.</p>
                <div class="space-y-4">
                    <input type="email" placeholder="Enter registered email" class="w-full px-4 py-2 rounded-lg border border-gray-200 outline-none">
                    <input type="text" placeholder="Enter your User ID" class="w-full px-4 py-2 rounded-lg border border-gray-200 outline-none">
                    <div class="flex justify-between items-center px-1">
                        <span class="text-xs font-bold text-gray-400">OTP <i class="fa-solid fa-circle-check"></i></span>
                        <span class="text-xs text-gray-400">Resend OTP (59s)</span>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" class="w-10 h-10 border rounded text-center" maxlength="1">
                        <input type="text" class="w-10 h-10 border rounded text-center" maxlength="1">
                        <input type="text" class="w-10 h-10 border rounded text-center" maxlength="1">
                        <span class="flex items-center">-</span>
                        <input type="text" class="w-10 h-10 border rounded text-center" maxlength="1">
                        <input type="text" class="w-10 h-10 border rounded text-center" maxlength="1">
                        <input type="text" class="w-10 h-10 border rounded text-center" maxlength="1">
                    </div>
                    <button class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Request OTP</button>
                    <p onclick="showForm('login')" class="text-center text-sm text-blue-600 cursor-pointer font-medium">Back to Login</p>
                </div>
            </div>

        </div>
    </main>

    <footer class="w-full py-6 text-center text-xs text-gray-400">
        <div class="flex justify-center gap-4 mb-2">
            <a href="#" class="hover:underline">Privacy Policy</a>
            <span>|</span>
            <a href="#" class="hover:underline">Terms of Service</a>
        </div>
        <p>&copy; 2024 YourWebsite. All rights reserved.</p>
    </footer>

    <script>
        function showForm(type) {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.add('hidden');
            document.getElementById('reset-form').classList.add('hidden');
            
            document.getElementById(type + '-form').classList.remove('hidden');
        }
    </script>
</body>
</html>
