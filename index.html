<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-gradient-custom {
            background: radial-gradient(circle at top right, #e0f2fe, #f8fafc);
        }
        .illustration-blob {
            background: linear-gradient(135deg, #bae6fd 0%, #ffffff 100%);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen p-4">

    <div class="w-full max-w-[375px] bg-white rounded-[3rem] shadow-2xl overflow-hidden border-[8px] border-gray-900 relative h-[812px] flex flex-col">
        
        <header class="flex justify-between items-center px-6 py-4 bg-white/80 backdrop-blur-md sticky top-0 z-10">
            <div class="flex items-center gap-1">
                <span class="text-[#4DA3E0] font-black italic text-xl tracking-tighter">MICRON</span>
            </div>
            <div class="flex items-center gap-4">
                <button class="text-xs font-semibold border border-gray-300 px-3 py-1 rounded-md text-gray-700">Sign Up</button>
                <div class="space-y-1 cursor-pointer">
                    <div class="w-5 h-0.5 bg-gray-600"></div>
                    <div class="w-5 h-0.5 bg-gray-600"></div>
                    <div class="w-5 h-0.5 bg-gray-600"></div>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto bg-gradient-custom pb-8">
            
            <div class="relative h-64 flex justify-center items-center">
                <div class="illustration-blob absolute w-60 h-60 opacity-50"></div>
                <div class="relative z-[1] flex flex-col items-center">
                    <div class="w-20 h-40 bg-blue-600 rounded-2xl border-4 border-white shadow-xl flex flex-col items-center pt-4 transform -rotate-6">
                        <div class="w-12 h-6 bg-white/20 rounded-md mb-2"></div>
                        <div class="bg-white px-2 py-1 rounded text-[8px] font-mono font-bold">124873</div>
                        <div class="mt-auto mb-4 w-6 h-6 bg-green-400 rounded-full flex items-center justify-center">
                            <span class="text-white text-[10px]">✓</span>
                        </div>
                    </div>
                    <div class="absolute -top-4 -left-10 bg-yellow-400 w-10 h-8 rounded shadow-md transform rotate-12"></div>
                    <div class="absolute top-20 -right-8 text-blue-400 transform rotate-45">➤</div>
                </div>
            </div>

            <div class="mx-6 bg-white rounded-3xl p-8 shadow-sm -mt-10 relative z-10">
                <div class="text-center mb-6">
                    <div class="flex justify-center mb-2">
                        <span class="text-[#4DA3E0] font-black italic text-lg tracking-tighter">MICRON</span>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-800">Welcome Back!</h1>
                    <p class="text-gray-400 text-sm">Login to your account</p>
                </div>

                <form class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                                ✉
                            </span>
                            <input type="email" placeholder="Enter your email" 
                                class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm bg-gray-50/50">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                                🔒
                            </span>
                            <input type="password" placeholder="Enter your password" 
                                class="w-full pl-10 pr-10 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm bg-gray-50/50">
                            <span class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 cursor-pointer">
                                👁
                            </span>
                        </div>
                    </div>

                    <button type="button" class="w-full bg-[#3B82F6] hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition duration-200 shadow-lg shadow-blue-200">
                        Login
                    </button>

                    <div class="text-center">
                        <a href="#" class="text-gray-500 text-sm font-medium hover:underline inline-flex items-center gap-1">
                            Forgot your password? <span class="text-lg">→</span>
                        </a>
                    </div>

                    <div class="border-t border-gray-100 pt-4 text-center">
                        <p class="text-gray-500 text-sm">
                            Don't have an account? <a href="#" class="text-cyan-600 font-bold">Sign up</a>
                        </p>
                    </div>
                </form>
            </div>

            <footer class="mt-8 text-center px-6">
                <div class="flex justify-center gap-4 text-[10px] text-gray-500 font-medium mb-2">
                    <a href="#">Privacy Policy</a>
                    <span class="text-gray-300">|</span>
                    <a href="#">Terms of Service</a>
                </div>
                <p class="text-[10px] text-gray-400">© 2024 YourWebsite. All rights reserved.</p>
            </footer>
        </div>
        
        <div class="h-1.5 w-32 bg-gray-300 rounded-full mx-auto my-2"></div>
    </div>

</body>
</html>
