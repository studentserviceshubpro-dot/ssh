<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-gradient-custom {
            background: linear-gradient(180deg, #E0EFFF 0%, #FFFFFF 100%);
        }
    </style>
</head>
<body class="bg-gradient-custom min-h-screen flex flex-col">

    <header class="flex justify-between items-center px-6 py-4 max-w-5xl mx-auto w-full">
        <div class="flex items-center gap-2">
            <img src="https://img.icons8.com/color/96/geography.png" alt="Logo" class="w-8 h-8">
            <span class="font-bold text-blue-900 tracking-tight text-xl uppercase">Logo</span>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="showView('signup')" class="border border-blue-900 text-blue-900 px-4 py-1 rounded-md text-sm font-medium hover:bg-blue-50 transition">Sign Up</button>
            <div class="space-y-1 cursor-pointer">
                <div class="w-6 h-0.5 bg-gray-600"></div>
                <div class="w-6 h-0.5 bg-gray-600"></div>
                <div class="w-6 h-0.5 bg-gray-600"></div>
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center px-4 pt-4 pb-12">
        
        <div class="relative w-64 h-48 mb-4">
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/otp-verification-illustration-download-in-svg-png-gif-file-formats--one-time-password-security-account-pack-safety-illustrations-5309322.png" 
                 alt="Security Illustration" class="w-full h-full object-contain">
        </div>

        <div id="form-container" class="bg-white rounded-3xl shadow-xl p-8 w-full max-w-md border border-blue-50">
            
            <div id="login-view">
                <div class="flex flex-col items-center mb-6">
                    <img src="https://img.icons8.com/color/96/geography.png" alt="Logo" class="w-10 h-10 mb-2">
                    <span class="font-bold text-blue-900 text-lg uppercase mb-4">Logo</span>
                    <h1 class="text-2xl font-bold text-gray-800">Welcome Back!</h1>
                    <p class="text-gray-500 text-sm">Login to your account</p>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                        <div class="relative">
                            <input type="email" placeholder="Enter your email" class="w-full border border-gray-200 rounded-lg py-2.5 pl-10 pr-4 focus:ring-2 focus:ring-blue-500 outline-none transition">
                            <span class="absolute left-3 top-3 text-gray-400">📧</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                        <div class="relative">
                            <input type="password" placeholder="Enter your password" class="w-full border border-gray-200 rounded-lg py-2.5 pl-10 pr-10 focus:ring-2 focus:ring-blue-500 outline-none transition">
                            <span class="absolute left-3 top-3 text-gray-400">🔒</span>
                            <span class="absolute right-3 top-3 cursor-pointer text-gray-400">👁️</span>
                        </div>
                    </div>
                    <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition-all">Login</button>
                    
                    <div class="text-center">
                        <button onclick="showView('reset')" class="text-gray-600 text-sm hover:underline font-medium">Forgot your password? <span class="text-blue-600">→</span></button>
                    </div>
                    
                    <div class="border-t border-gray-100 pt-4 text-center">
                        <p class="text-sm text-gray-500">Don't have an account? <button onclick="showView('signup')" class="text-blue-600 font-bold hover:underline">Sign up</button></p>
                    </div>
                </div>
            </div>

            <div id="signup-view" class="hidden">
                <h2 class="text-xl font-bold text-blue-900 mb-6 border-b pb-2">Sign Up to Get Started</h2>
                <div class="space-y-4">
                    <input type="text" placeholder="Enter your full name" class="w-full border border-gray-200 rounded-lg py-2 px-4 focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="text" placeholder="DD/MM/YYYY" class="w-full border border-gray-200 rounded-lg py-2 px-4 focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="tel" placeholder="Phone number" class="w-full border border-gray-200 rounded-lg py-2 px-4 focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="email" placeholder="Enter your email" class="w-full border border-gray-200 rounded-lg py-2 px-4 focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="text" placeholder="Enter code (Optional)" class="w-full border border-gray-200 rounded-lg py-2 px-4 focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="password" placeholder="Create a password" class="w-full border border-gray-200 rounded-lg py-2 px-4 focus:ring-2 focus:ring-blue-500 outline-none">
                    
                    <button class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 shadow-md">Create Account</button>
                    <button onclick="showView('login')" class="w-full text-sm text-gray-500 mt-2">Back to Login</button>
                </div>
            </div>

            <div id="reset-view" class="hidden">
                <h2 class="text-xl font-bold text-blue-900 mb-2">Reset Your Password</h2>
                <p class="text-xs text-gray-500 mb-6">Enter your details to receive an OTP.</p>
                <div class="space-y-4">
                    <input type="email" placeholder="Enter registered email" class="w-full border border-gray-200 rounded-lg py-2 px-4 focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="text" placeholder="Enter your User ID" class="w-full border border-gray-200 rounded-lg py-2 px-4 focus:ring-2 focus:ring-blue-500 outline-none">
                    
                    <div class="flex justify-between items-center text-xs mb-2">
                        <span class="font-semibold text-gray-700">OTP</span>
                        <span class="text-gray-400 font-medium">Resend OTP (59s)</span>
                    </div>
                    <div class="flex gap-2 justify-between">
                        <input type="text" maxlength="1" class="w-10 h-10 border border-gray-200 rounded text-center focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="text" maxlength="1" class="w-10 h-10 border border-gray-200 rounded text-center focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="text" maxlength="1" class="w-10 h-10 border border-gray-200 rounded text-center focus:ring-2 focus:ring-blue-500 outline-none">
                        <span class="pt-2 text-gray-400">-</span>
                        <input type="text" maxlength="1" class="w-10 h-10 border border-gray-200 rounded text-center focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="text" maxlength="1" class="w-10 h-10 border border-gray-200 rounded text-center focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="text" maxlength="1" class="w-10 h-10 border border-gray-200 rounded text-center focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <button class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 shadow-md">Request OTP</button>
                    <button onclick="showView('login')" class="w-full text-sm text-gray-500 mt-2">Back to Login</button>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-8 text-center border-t border-blue-100 bg-white/50 backdrop-blur-sm">
        <div class="flex justify-center gap-4 text-sm font-medium text-blue-900 mb-2">
            <a href="#" class="hover:underline">Privacy Policy</a>
            <span class="text-gray-300">|</span>
            <a href="#" class="hover:underline">Terms of Service</a>
        </div>
        <p class="text-xs text-gray-500">© 2024 YourWebsite. All rights reserved.</p>
    </footer>

    <script>
        function showView(view) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('signup-view').classList.add('hidden');
            document.getElementById('reset-view').classList.add('hidden');
            
            document.getElementById(view + '-view').classList.remove('hidden');
        }
    </script>
</body>
</html>
