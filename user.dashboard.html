<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(to bottom, #e0f2fe, #ffffff);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .flash-news-scroll {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }
        .flash-news-scroll::-webkit-scrollbar { display: none; }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <header class="bg-white shadow-md p-4 flex justify-between items-center sticky top-0 z-50 animate__animated animate__fadeInDown">
        <div class="flex items-center gap-3">
            <button class="text-gray-600 text-xl"><i class="fas fa-bars"></i></button>
            <img src="IMG_20260414_113028.jpg" alt="Logo" class="h-10 w-10 rounded-lg">
        </div>
        <div class="animate__animated animate__bounceIn">
            <img src="https://ui-avatars.com/api/?name=User&background=0ea5e9&color=fff" alt="Profile" class="h-10 w-10 rounded-full border-2 border-sky-500">
        </div>
    </header>

    <main class="p-4 pb-24">
        <section class="mt-4 animate__animated animate__fadeInLeft">
            <h1 class="text-2xl font-bold text-gray-800">Welcome back, <span class="text-sky-600">Alex!</span> 👋</h1>
            <p class="text-gray-500 text-sm">Ready to level up your skills today?</p>
        </section>

        <section class="mt-6 animate__animated animate__zoomIn">
            <div class="flash-news-scroll gap-4">
                <div class="min-w-[300px] h-40 bg-sky-500 rounded-2xl relative overflow-hidden flex-shrink-0 shadow-lg">
                    <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=400" class="w-full h-full object-cover opacity-50">
                    <div class="absolute bottom-3 left-3 text-white font-bold">New AI Course Launched!</div>
                </div>
                <div class="min-w-[300px] h-40 bg-indigo-500 rounded-2xl relative overflow-hidden flex-shrink-0 shadow-lg">
                    <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=400" class="w-full h-full object-cover opacity-50">
                    <div class="absolute bottom-3 left-3 text-white font-bold">Cybersecurity Workshop LIVE</div>
                </div>
            </div>
        </section>

        <section class="mt-8 grid grid-cols-3 gap-3 animate__animated animate__fadeInUp">
            <div class="bg-white p-3 rounded-xl shadow-sm text-center border-b-4 border-sky-400">
                <p class="text-xs text-gray-500">Courses</p>
                <p class="font-bold text-lg">12</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm text-center border-b-4 border-green-400">
                <p class="text-xs text-gray-500">Earnings</p>
                <p class="font-bold text-lg">$450</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm text-center border-b-4 border-purple-400">
                <p class="text-xs text-gray-500">Certs</p>
                <p class="font-bold text-lg">05</p>
            </div>
        </section>

        <section class="mt-8 grid grid-cols-2 gap-4 animate__animated animate__fadeIn">
            <button class="flex flex-col items-center justify-center p-6 bg-white rounded-2xl shadow-sm hover:bg-sky-50 transition-colors">
                <i class="fas fa-book-open text-3xl text-sky-500 mb-2"></i>
                <span class="font-semibold text-gray-700">Courses</span>
            </button>
            <button class="flex flex-col items-center justify-center p-6 bg-white rounded-2xl shadow-sm hover:bg-sky-50 transition-colors">
                <i class="fas fa-gamepad text-3xl text-orange-500 mb-2"></i>
                <span class="font-semibold text-gray-700">Games</span>
            </button>
            <button class="flex flex-col items-center justify-center p-6 bg-white rounded-2xl shadow-sm hover:bg-sky-50 transition-colors">
                <i class="fas fa-magic text-3xl text-purple-500 mb-2"></i>
                <span class="font-semibold text-gray-700 text-center">AI Resume</span>
            </button>
            <button class="flex flex-col items-center justify-center p-6 bg-white rounded-2xl shadow-sm hover:bg-sky-50 transition-colors">
                <i class="fas fa-compass text-3xl text-green-500 mb-2"></i>
                <span class="font-semibold text-gray-700 text-center">Career Guide</span>
            </button>
        </section>

        <section class="mt-8 grid grid-cols-4 gap-4 pb-10 animate__animated animate__fadeInUp">
            <div class="flex flex-col items-center"><i class="fas fa-list text-gray-600 bg-white p-3 rounded-full shadow-sm mb-1"></i><span class="text-[10px]">Playlist</span></div>
            <div class="flex flex-col items-center"><i class="fas fa-play text-gray-600 bg-white p-3 rounded-full shadow-sm mb-1"></i><span class="text-[10px]">Videos</span></div>
            <div class="flex flex-col items-center"><i class="fas fa-wallet text-gray-600 bg-white p-3 rounded-full shadow-sm mb-1"></i><span class="text-[10px]">Wallet</span></div>
            <div class="flex flex-col items-center"><i class="fas fa-share-alt text-gray-600 bg-white p-3 rounded-full shadow-sm mb-1"></i><span class="text-[10px]">Refer</span></div>
            <div class="flex flex-col items-center"><i class="fas fa-tag text-gray-600 bg-white p-3 rounded-full shadow-sm mb-1"></i><span class="text-[10px]">Offers</span></div>
            <div class="flex flex-col items-center"><i class="fas fa-trophy text-gray-600 bg-white p-3 rounded-full shadow-sm mb-1"></i><span class="text-[10px]">Rank</span></div>
            <div class="flex flex-col items-center"><i class="fas fa-cog text-gray-600 bg-white p-3 rounded-full shadow-sm mb-1"></i><span class="text-[10px]">Settings</span></div>
        </section>
    </main>

    <footer class="bg-white border-t border-gray-200 fixed bottom-0 w-full p-4 flex justify-around items-center animate__animated animate__fadeInUp">
        <i class="fas fa-home text-sky-600 text-xl"></i>
        <i class="fas fa-search text-gray-400 text-xl"></i>
        <div class="bg-sky-500 p-3 rounded-full -mt-10 border-4 border-white shadow-lg text-white">
            <i class="fas fa-plus"></i>
        </div>
        <i class="fas fa-bell text-gray-400 text-xl"></i>
        <i class="fas fa-user text-gray-400 text-xl"></i>
    </footer>

</body>
</html>
