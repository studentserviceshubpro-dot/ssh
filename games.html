<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micron App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>

    <header class="header">
        <div class="menu-icon">☰</div>
        <div class="logo">MICRON</div>
        <div class="user-profile">US</div>
    </header>

    <main id="app-content">
        <section id="dashboard" class="page active">
            <div class="grid-container">
                <div class="card"><i class="icon-blue">📖</i><p>Courses</p></div>
                <div class="card clickable" onclick="showGames()">
                    <i class="icon-orange">🎮</i><p>Games</p>
                </div>
                <div class="card"><i class="icon-purple">✏️</i><p>AI Resume</p></div>
                <div class="card"><i class="icon-green">🧭</i><p>Career Guide</p></div>
            </div>
        </section>

        <section id="games-page" class="page hidden">
            <div class="games-header">
                <h2>Best Games</h2>
                <input type="text" placeholder="Search Games..." class="search-bar">
            </div>
            <div class="games-grid">
                <div class="game-card">
                    <span class="badge">HOT</span>
                    <img src="https://via.placeholder.com/150x100" alt="Game">
                    <div class="game-info">
                        <h3>Sudoku</h3>
                        <p>Mind Sharpening</p>
                        <div class="rating">⭐ 4.8</div>
                        <button class="play-btn">Play</button>
                    </div>
                </div>
                </div>
        </section>
    </main>

    <footer class="footer">
        <nav>
            <div class="nav-item active" onclick="showDashboard()">🏠</div>
            <div class="nav-item">🔍</div>
            <div class="nav-item plus-btn">+</div>
            <div class="nav-item">🔔</div>
            <div class="nav-item">👤</div>
        </nav>
    </footer>

    <script>
        function showGames() {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('games-page').classList.remove('hidden');
        }
        function showDashboard() {
            document.getElementById('games-page').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }
    </script>
</body>
</html>
